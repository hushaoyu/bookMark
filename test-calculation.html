<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试多层运算</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .test-case { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
    .result { font-weight: bold; margin-top: 5px; }
  </style>
</head>
<body>
  <h1>测试多层运算</h1>
  <div class="test-case">
    <div>测试用例1: 100-20-10</div>
    <div class="result" id="result1"></div>
  </div>
  <div class="test-case">
    <div>测试用例2: 50+30-15</div>
    <div class="result" id="result2"></div>
  </div>
  <div class="test-case">
    <div>测试用例3: 200-50+25</div>
    <div class="result" id="result3"></div>
  </div>

  <script>
    function calculateAmount(input) {
      try {
        const result = eval(input);
        return typeof result === 'number' && !isNaN(result) ? result : 0;
      } catch (error) {
        console.error('Invalid amount calculation:', error);
        return 0;
      }
    }

    document.getElementById('result1').textContent = '结果: ' + calculateAmount('100-20-10');
    document.getElementById('result2').textContent = '结果: ' + calculateAmount('50+30-15');
    document.getElementById('result3').textContent = '结果: ' + calculateAmount('200-50+25');
  </script>
</body>
</html>
